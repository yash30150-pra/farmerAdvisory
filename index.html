<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FARM-TASTIC SIX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">🌱AQ-FAS</div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">👋 Namaste! How can I help you with your crops today?</div>
    </div>
    <div class="chat-input">
      <input type="file" id="imageUpload" accept="image/*" hidden>
      <button class="icon-btn" title="Upload Image" onclick="document.getElementById('imageUpload').click()">📷</button>
      <button class="icon-btn" title="Voice Input" onclick="startVoice()">🎤</button>
      <input type="text" id="userInput" placeholder="अपनी समस्या हमें बताएं.......">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="style.js"></script>
</body>
</html>
